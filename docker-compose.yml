services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verehire
      POSTGRES_USER: verehire
      POSTGRES_PASSWORD: verehire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verehire -d verehire"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://verehire:verehire@db:5432/verehire}
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MIDNIGHT_RPC_URL: ${MIDNIGHT_RPC_URL:-}
      MIDNIGHT_PROOF_SERVER_URL: ${MIDNIGHT_PROOF_SERVER_URL:-}
      MIDNIGHT_NETWORK: ${MIDNIGHT_NETWORK:-devnet}
      MIDNIGHT_PRIVATE_KEY: ${MIDNIGHT_PRIVATE_KEY:-}
      MIDNIGHT_CONTRACT_ADDRESS: ${MIDNIGHT_CONTRACT_ADDRESS:-}
      MIDNIGHT_ENABLED: ${MIDNIGHT_ENABLED:-true}
      MIDNIGHT_FALLBACK_MOCK_PROOFS: ${MIDNIGHT_FALLBACK_MOCK_PROOFS:-true}
      MIDNIGHT_LOG_REQUESTS: ${MIDNIGHT_LOG_REQUESTS:-true}
      MAX_RESUME_SIZE_MB: ${MAX_RESUME_SIZE_MB:-10}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
